name: Deploy hub to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "hub/**"
      - "src/styles/**"
      - "src/components/ThemeToggle.astro"
      - "src/components/Icon.astro"
      - "src/lib/favicon.ts"
      - "src/lib/pageLifecycle.ts"
      - "astro.config.hub.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # No `pnpm test` gate here: the full suite runs on every push in ci.yml
      # (same commit, in parallel), and it includes release.test.ts — which
      # checks the course-template lockfile against its pin. That check is red on
      # the release commit by design (the lockfile sync is a separate post-tag
      # commit), which would fail the deploy and, worse, not re-run on the
      # lockfile-sync commit (outside this workflow's path filter), stranding the
      # hub un-deployed. `pnpm hub:build` below is the real gate for the hub.
      - run: pnpm hub:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-hub/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
