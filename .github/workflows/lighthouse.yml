name: Lighthouse

on:
  pull_request:
  workflow_dispatch:

# SEO / PWA / perf guard. DESIGN targets Lighthouse ≥95 but
# nothing enforced it; the SEO/PWA metadata can silently regress. Complements the
# visual-regression workflow (which guards pixels, not metadata / CWV).
# The resource-summary byte budgets in the lighthouserc files are generous
# error thresholds; tighten them once the KaTeX-CSS and inline-script diets land.
permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm hub:build
      # `pnpm dlx` fetches the CI-only tool ephemerally — no project dependency,
      # keeping the near-zero-dependency stance. Asserts the budgets in the
      # lighthouserc files against the static demo build and the hub build.
      - run: pnpm dlx @lhci/cli@0.15.1 autorun --config=lighthouserc.json
      - run: pnpm dlx @lhci/cli@0.15.1 autorun --config=lighthouserc.hub.json
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: lighthouse-report
          path: |
            lhci-report/
            lhci-report-hub/
          retention-days: 14
