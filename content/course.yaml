schemaVersion: 3
code: DEMO101
title: Demokurs
subtitle: Kitchen-sink for study-companion
term: V2026
language: nb

# Per-theme accents, picked from the Flexoki palette so each course has its own
# colour that still sits in the warm-paper system (light / dark pairs, all AA on
# their ground): blue #205ea6/#4385be · cyan #1c6c66/#3aa99f · green #536907/#879a39 ·
# orange #9d4310/#da702c · red #af3029/#e8705f · purple #5e409d/#8b7ec8 ·
# magenta #a02f6f/#ce5d97. (This course: blue.)
accent: "#205ea6"
accentDark: "#4385be"

exam:
  date: 2026-06-15
  # Start time is a VERBATIM string (never a Date) — a time-of-day Date would
  # reintroduce the UTC-midnight print bug lib/dates.ts guards against.
  time: "09:00"
  durationMinutes: 240
  format: 4t skriftlig
  aids: Godkjent kalkulator + formelsamling
  # Link the OFFICIAL exam formula sheet. Prefer a university-hosted PDF; if none
  # exists, vendor the PDF in public/ and link that (e.g. "/formelark.pdf").
  formulaSheetUrl: "https://example.com/exams/formelark.pdf"

# Canonical link to the official university course page (rendered in the hero +
# footer), distinct from the free-form `links` list below.
courseUrl: "https://example.com/emne/DEMO101"

# Provider for the Course JSON-LD (explicit, never derived from a URL host) +
# a social handle for the Twitter card. Both optional/additive.
institution: "Example University"
seo:
  twitter: "@studycompanion"

features: { progress: true, search: true, flashcards: true, theme: true }

# This demo course lives inside the framework repo, so repoUrl points there and
# the footer "edit this page" links resolve to the real section files.
repoUrl: "https://github.com/MartinSA04/StudyCompanion"
repoBranch: main

# Exercises the sidebar Lenker grouping: two `group`s (first-seen order) + one
# group-less link (the trailing "Andre lenker" bucket), plus a muted `note`.
links:
  - { label: "Forelesningsplan", url: "https://example.com/timeplan", group: "Timeplan" }
  - { label: "Zoom-rom", url: "https://example.com/zoom", group: "Timeplan", note: "Passord: optikk" }
  - { label: "Kompendium (PDF)", url: "https://example.com/kompendium.pdf", group: "Ressurser" }
  - { label: "study-companion (GitHub)", url: "https://github.com/MartinSA04/StudyCompanion" }

# Exercises <FormulaSheet>: grouping by `section`, plus must-memorize rows
# (memorize + onSheet:false) that get the star badge and the off-sheet stripe.
formulas:
  - { tex: "n_1\\sin\\theta_1 = n_2\\sin\\theta_2", label: "<b>Snells lov</b> — brytning i en grenseflate", section: "Geometrisk optikk", id: snells }
  - { tex: "\\frac{1}{f} = \\frac{1}{s} + \\frac{1}{s'}", label: "Tynnlinseformelen", section: "Geometrisk optikk", id: tynnlinse }
  - { tex: "\\sin\\theta_c = \\frac{n_2}{n_1}", label: "Grensevinkel for totalrefleksjon", section: "Geometrisk optikk", memorize: true, onSheet: false }
  - { tex: "d\\sin\\theta = m\\lambda", label: "Maksima i flerspaltinterferens", section: "Bølgeoptikk" }
  - { tex: "\\Delta y = \\frac{\\lambda L}{d}", label: "Stripeavstand i dobbeltspalteforsøket", section: "Bølgeoptikk", memorize: true, onSheet: false }

# Exercises the <Glossary> tool page + inline <Term> links: grouped by `section`,
# plus one section-less entry (the ungrouped bucket) and inline math / HTML.
glossary:
  - { term: "Brytningsindeks", definition: "Forholdet $n = c/v$ mellom lysfarten i vakuum og farten i mediet.", section: "Geometrisk optikk" }
  - { term: "Totalrefleksjon", definition: "Når lys går fra tett mot tynt medium med en vinkel over grensevinkelen $\\theta_c$, reflekteres alt tilbake.", section: "Geometrisk optikk" }
  - { term: "Koherens", definition: "To bølger er <b>koherente</b> når faseforskjellen er konstant — forutsetningen for stabil interferens.", section: "Bølgeoptikk" }
  - { term: "Virtuelt bilde", definition: "Et bilde som dannes der strålenes forlengelser møtes; kan ikke fanges på en skjerm." }

# Exercises <ExamList>: newest first, with and without a solution link.
exams:
  - { label: "Eksamen V2025", date: 2025-06-02, url: "https://example.com/exams/2025.pdf", solutionUrl: "https://example.com/exams/2025-losning.pdf" }
  - { label: "Eksamen V2024", date: 2024-05-28, url: "https://example.com/exams/2024.pdf" }

# Exercises the overview agenda (flat list, no done-states): one past item that
# the build-time filter drops from the SSR output entirely, plus far-future
# items (2028+, so they stay "upcoming" for years) with a `note` and a `url` on
# some. Client auto-hide covers the between-builds gap instead: a row SSR'd as
# upcoming hides itself once its date passes on the viewer's clock.
deadlines:
  - { title: "Øving 3", date: 2025-02-10, note: "Innlevering i Blackboard" }
  - { title: "Øving 8", date: 2028-09-15, note: "Innlevering i Blackboard", url: "https://example.com/oving-8" }
  - { title: "Prosjektinnlevering", date: 2028-11-01, url: "https://example.com/prosjekt" }
  - { title: "Muntlig vurdering", date: 2029-01-10 }
